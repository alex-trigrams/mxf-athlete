<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>MXF Athlete — Coaching by Sean McManus · Clarkson, Perth WA</title>
  <meta name="description" content="MXF helps athletes and everyday people build stronger bodies, improve performance, lose fat and gain muscle through personalised coaching." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
/* MXF Athlete — landing page */
:root {
  --bg: #0a0a0a;
  --bg-2: #121212;
  --bg-3: #1a1a1a;
  --fg: #f4f1ec;
  --fg-dim: #a3a09a;
  --fg-mute: #6b6963;
  --accent: #FFB400;
  --accent-ink: #0a0a0a;
  --line: rgba(244,241,236,0.10);
  --line-strong: rgba(244,241,236,0.22);
  --ease: cubic-bezier(0.22, 1, 0.36, 1);
  --r-sm: 10px;
  --r-md: 14px;
  --r-lg: 20px;
  --r-xl: 28px;
  --r-pill: 999px;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); }
html { scroll-behavior: smooth; }
body {
  font-family: "Archivo", "Helvetica Neue", Helvetica, Arial, sans-serif;
  font-weight: 400; font-size: 16px; line-height: 1.55;
  -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
  overflow-x: hidden;
}
img { max-width: 100%; display: block; }
a { color: inherit; text-decoration: none; }
button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }

.display {
  font-family: "Archivo", "Helvetica Neue", Helvetica, Arial, sans-serif;
  font-weight: 500; letter-spacing: -0.025em; line-height: 1.02; text-wrap: balance;
}
.display em.accent-word { font-style: normal; color: var(--accent); font-weight: 500; }
.h-mono {
  font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--fg-dim);
}
.eyebrow {
  font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--accent); display: inline-flex; align-items: center; gap: 10px;
}
.eyebrow::before { content: ""; width: 22px; height: 1px; background: var(--accent); display: inline-block; }

.wordmark {
  font-family: "Archivo", "Helvetica Neue", Helvetica, Arial, sans-serif;
  font-weight: 800; letter-spacing: -0.06em; font-size: 26px; line-height: 1;
  display: inline-flex; align-items: baseline;
}
.wordmark::after { content: "."; color: var(--accent); margin-left: -2px; }

.btn {
  display: inline-flex; align-items: center; gap: 10px; padding: 13px 20px;
  border-radius: var(--r-pill); font-weight: 600; font-size: 14px; letter-spacing: 0.01em;
  transition: transform 220ms var(--ease), background 220ms var(--ease), color 220ms var(--ease), box-shadow 220ms var(--ease), border-color 220ms var(--ease);
  will-change: transform;
}
.btn:hover { transform: translateY(-2px); }
.btn-primary { background: var(--accent); color: var(--accent-ink); }
.btn-primary:hover { box-shadow: 0 12px 32px -12px color-mix(in oklch, var(--accent) 55%, transparent); }
.btn-ghost { background: transparent; color: var(--fg); border: 1px solid var(--line-strong); }
.btn-ghost:hover { border-color: var(--fg); }
.btn .arr { display: inline-block; transition: transform 220ms var(--ease); }
.btn:hover .arr { transform: translateX(4px); }
.btn-small { padding: 10px 14px; font-size: 13px; }

.container { width: 100%; max-width: 1280px; margin: 0 auto; padding: 0 22px; }
section { position: relative; }

.reveal { opacity: 0; transform: translateY(24px); transition: opacity 900ms var(--ease), transform 900ms var(--ease); }
.reveal.in { opacity: 1; transform: translateY(0); }
.reveal-stagger > * {
  opacity: 0; transform: translateY(18px);
  transition: opacity 700ms var(--ease), transform 700ms var(--ease);
  transition-delay: calc(var(--i, 0) * 70ms);
}
.reveal-stagger.in > * { opacity: 1; transform: translateY(0); }

.scroll-progress {
  position: fixed; top: 0; left: 0; height: 2px;
  background: var(--accent); width: 0%; z-index: 90; transition: width 80ms linear;
}

.topnav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 80;
  display: flex; align-items: center; justify-content: space-between; padding: 14px 22px;
  transition: background 300ms var(--ease), backdrop-filter 300ms var(--ease), border-color 300ms var(--ease);
  border-bottom: 1px solid transparent;
}
.topnav.scrolled {
  background: rgba(10,10,10,0.72);
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  border-bottom-color: var(--line);
}
.topnav .links { display: none; gap: 28px; font-size: 13px; font-weight: 500; }
.topnav .links a { color: var(--fg-dim); transition: color 200ms var(--ease); }
.topnav .links a:hover { color: var(--fg); }
.topnav .nav-cta {
  font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 11px;
  letter-spacing: 0.14em; text-transform: uppercase; padding: 9px 14px;
  border: 1px solid var(--accent); color: var(--accent); border-radius: var(--r-pill);
  transition: background 200ms var(--ease), color 200ms var(--ease);
}
.topnav .nav-cta:hover { background: var(--accent); color: var(--accent-ink); }
@media (min-width: 880px) {
  .topnav { padding: 18px 32px; }
  .topnav .links { display: flex; }
}

.loader {
  position: fixed; inset: 0; background: var(--bg); z-index: 200;
  display: grid; place-items: center;
  transition: opacity 700ms var(--ease), visibility 700ms;
}
.loader.done { opacity: 0; visibility: hidden; pointer-events: none; }
.loader-inner { display: flex; flex-direction: column; align-items: center; gap: 26px; text-align: center; }
.stopwatch {
  font-family: "Archivo", sans-serif; font-weight: 500;
  font-size: clamp(80px, 18vw, 168px); line-height: 0.95; letter-spacing: -0.04em;
  color: var(--fg); display: flex; align-items: baseline; gap: 6px;
  font-variant-numeric: tabular-nums;
}
.stopwatch .ms { font-size: 0.42em; color: var(--accent); font-weight: 500; }
.loader-bar {
  width: min(70vw, 360px); height: 2px; background: var(--line);
  position: relative; overflow: hidden; border-radius: var(--r-pill);
}
.loader-bar > i { position: absolute; top: 0; left: 0; bottom: 0; width: 0%; background: var(--accent); transition: width 80ms linear; }
.loader-tick { font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.24em; color: var(--fg-mute); text-transform: uppercase; }

.hero {
  position: relative; min-height: 100svh;
  display: flex; flex-direction: column; justify-content: flex-end;
  padding: 100px 22px 36px; overflow: hidden;
}
.hero-bg { position: absolute; inset: 0; z-index: 0; }
.hero-bg::after {
  content: ""; position: absolute; inset: 0;
  background: radial-gradient(70% 50% at 20% 100%, rgba(255,180,0,0.10), transparent 60%),
    linear-gradient(180deg, rgba(10,10,10,0.10) 0%, rgba(10,10,10,0.85) 70%, var(--bg) 100%);
  z-index: 2;
}
.hero-video-slot {
  position: absolute; inset: 0; background-color: #161614;
  background-image: repeating-linear-gradient(135deg, rgba(255,255,255,0.025) 0 2px, transparent 2px 14px),
    radial-gradient(60% 50% at 60% 30%, rgba(255,180,0,0.05), transparent 70%);
  z-index: 1; display: grid; place-items: center;
}
.hero-video-slot video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
.video-placeholder {
  position: relative; display: inline-flex; flex-direction: column; align-items: center;
  gap: 10px; padding: 16px 20px; border: 1px dashed var(--line-strong);
  border-radius: var(--r-md); color: rgba(244,241,236,0.45);
  font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.22em;
  text-transform: uppercase; background: rgba(10,10,10,0.35); backdrop-filter: blur(2px);
}
.video-placeholder .play {
  width: 36px; height: 36px; border-radius: 50%; border: 1px solid currentColor;
  display: grid; place-items: center;
}
.video-placeholder .play::after {
  content: ""; width: 0; height: 0;
  border-left: 8px solid currentColor; border-top: 5px solid transparent;
  border-bottom: 5px solid transparent; margin-left: 2px;
}
.hero-grain {
  position: absolute; inset: 0;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.9 0 0 0 0 0.9 0 0 0 0 0.9 0 0 0 0.12 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  opacity: 0.4; mix-blend-mode: overlay; z-index: 3; pointer-events: none;
}
.hero-inner { position: relative; z-index: 4; display: flex; flex-direction: column; gap: 32px; }
.hero-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; flex-wrap: wrap; }
.hero-meta {
  display: flex; flex-direction: column; gap: 6px;
  font-family: "JetBrains Mono", monospace; font-size: 11px;
  letter-spacing: 0.16em; color: var(--fg-dim); text-transform: uppercase;
}
.hero-meta .blink {
  width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
  display: inline-block; animation: blink 1.6s infinite; margin-right: 8px; vertical-align: middle;
}
@keyframes blink {
  0%, 60% { opacity: 1; transform: scale(1); }
  80%, 100% { opacity: 0.3; transform: scale(0.85); }
}
.hero-title { font-size: clamp(44px, 8.4vw, 116px); max-width: 18ch; }
.hero-title .row { display: block; overflow: hidden; }
.hero-title .row > span {
  display: inline-block; transform: translateY(110%);
  animation: rise 1100ms var(--ease) forwards; animation-delay: var(--d, 0ms);
}
@keyframes rise { to { transform: translateY(0); } }
.hero-bottom { display: flex; flex-direction: column; gap: 22px; }
.hero-sub { font-size: clamp(15px, 1.5vw, 18px); line-height: 1.55; color: var(--fg-dim); max-width: 540px; }
.hero-sub strong { color: var(--fg); font-weight: 600; }
.hero-actions { display: flex; gap: 12px; flex-wrap: wrap; }
.hero-stats {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
  border-top: 1px solid var(--line); padding-top: 22px; margin-top: 8px;
}
.hero-stats .stat { display: flex; flex-direction: column; gap: 4px; }
.hero-stats .stat .num {
  font-family: "Archivo", sans-serif; font-weight: 500;
  font-size: clamp(28px, 4.8vw, 44px); letter-spacing: -0.03em; line-height: 1; color: var(--fg);
}
.hero-stats .stat .num .unit { color: var(--accent); font-size: 0.55em; margin-left: 4px; font-weight: 500; }
.hero-stats .stat .lbl {
  font-family: "JetBrains Mono", monospace; font-size: 10px;
  letter-spacing: 0.16em; color: var(--fg-dim); text-transform: uppercase;
}
.scroll-cue {
  position: absolute; bottom: 18px; right: 22px; z-index: 5; display: none;
  font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.22em;
  color: var(--fg-dim); text-transform: uppercase; align-items: center; gap: 10px;
}
.scroll-cue .line {
  width: 1px; height: 56px; background: linear-gradient(180deg, transparent, var(--accent));
  display: inline-block; animation: cue 2s var(--ease) infinite; transform-origin: top;
}
@keyframes cue {
  0% { transform: scaleY(0); }
  50% { transform: scaleY(1); }
  100% { transform: scaleY(0); transform-origin: bottom; }
}
@media (min-width: 768px) {
  .scroll-cue { display: flex; }
  .hero { padding: 120px 36px 56px; }
}

.marquee { border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); padding: 18px 0; overflow: hidden; background: var(--bg); }
.marquee-track { display: flex; gap: 40px; white-space: nowrap; animation: scroll 32s linear infinite; width: max-content; }
.marquee-track span {
  font-family: "Archivo", sans-serif; font-weight: 500; font-size: 20px;
  letter-spacing: -0.01em; color: var(--fg); display: inline-flex; align-items: center; gap: 40px;
}
.marquee-track .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); display: inline-block; }
@keyframes scroll { to { transform: translateX(-50%); } }

.section { padding: 80px 0; }
@media (min-width: 880px) { .section { padding: 112px 0; } }
.section-head { display: flex; justify-content: space-between; align-items: flex-end; gap: 22px; margin-bottom: 44px; flex-wrap: wrap; }
.section-title { font-size: clamp(32px, 5.4vw, 64px); max-width: 16ch; }
.section-title .accent { color: var(--accent); }
.tag-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line);
  margin-bottom: 44px; font-family: "JetBrains Mono", monospace;
  font-size: 11px; letter-spacing: 0.2em; color: var(--fg-dim); text-transform: uppercase;
}

.about-grid { display: grid; gap: 28px; grid-template-columns: 1fr; }
@media (min-width: 880px) { .about-grid { grid-template-columns: 1.05fr 1fr; gap: 56px; align-items: start; } }
.about-carousel {
  position: relative; aspect-ratio: 4 / 5; background: var(--bg-3);
  background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.025) 0 2px, transparent 2px 14px);
  overflow: hidden; border: 1px solid var(--line); border-radius: var(--r-lg);
}
.about-carousel .slide {
  position: absolute; inset: 0; opacity: 0; transform: scale(1.03);
  transition: opacity 700ms var(--ease), transform 900ms var(--ease); pointer-events: none;
}
.about-carousel .slide.active { opacity: 1; transform: scale(1); pointer-events: auto; }
.about-carousel .slide .img-slot { width: 100%; height: 100%; display: block; }
.about-carousel .ac-badge {
  position: absolute; top: 14px; left: 14px; background: var(--accent);
  color: var(--accent-ink); font-family: "JetBrains Mono", monospace;
  font-size: 10px; letter-spacing: 0.2em; padding: 7px 11px;
  text-transform: uppercase; border-radius: var(--r-pill); z-index: 3;
}
.about-carousel .ac-caption {
  position: absolute; left: 14px; bottom: 14px; right: 70px; z-index: 3;
  display: flex; flex-direction: column; gap: 4px; pointer-events: none;
}
.about-carousel .ac-caption .what {
  font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.2em;
  color: rgba(244,241,236,0.85); text-transform: uppercase;
  background: rgba(10,10,10,0.55); backdrop-filter: blur(6px);
  padding: 6px 10px; border-radius: var(--r-pill); align-self: flex-start;
}
.about-carousel .ac-caption .yr { font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.18em; color: var(--accent); text-transform: uppercase; padding-left: 10px; }
.about-carousel .ac-nav { position: absolute; right: 14px; bottom: 14px; display: flex; gap: 8px; z-index: 3; }
.about-carousel .ac-btn {
  width: 36px; height: 36px; border-radius: 50%; border: 1px solid rgba(244,241,236,0.3);
  background: rgba(10,10,10,0.55); backdrop-filter: blur(6px); color: var(--fg);
  display: grid; place-items: center;
  transition: background 200ms var(--ease), color 200ms var(--ease), border-color 200ms var(--ease);
}
.about-carousel .ac-btn:hover { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
.about-carousel .ac-dots { position: absolute; top: 18px; right: 14px; display: flex; gap: 6px; z-index: 3; }
.about-carousel .ac-dots button {
  width: 22px; height: 3px; border-radius: 2px; background: rgba(244,241,236,0.22);
  transition: background 240ms var(--ease), width 240ms var(--ease); position: relative; overflow: hidden;
}
.about-carousel .ac-dots button.active { background: rgba(244,241,236,0.18); width: 32px; }
.about-carousel .ac-dots button.active::after {
  content: ""; position: absolute; inset: 0; background: var(--accent);
  transform-origin: left; animation: dot-fill 5000ms linear forwards;
}
@keyframes dot-fill { from { transform: scaleX(0); } to { transform: scaleX(1); } }
.about-body { display: flex; flex-direction: column; gap: 24px; }
.about-name { font-size: clamp(32px, 5.2vw, 60px); }
.about-name .accent { color: var(--accent); }
.about-bio { color: var(--fg-dim); font-size: 17px; line-height: 1.6; }
.about-bio strong { color: var(--fg); font-weight: 600; }
.about-facts { display: grid; grid-template-columns: 1fr 1fr; gap: 0; border-top: 1px solid var(--line); }
.about-facts .fact { padding: 20px 18px 20px 0; border-bottom: 1px solid var(--line); }
.about-facts .fact:nth-child(odd) { padding-right: 18px; border-right: 1px solid var(--line); padding-left: 0; }
.about-facts .fact:nth-child(even) { padding-left: 22px; padding-right: 0; }
.about-facts .fact .num { font-family: "Archivo", sans-serif; font-weight: 500; font-size: clamp(30px, 5.2vw, 44px); letter-spacing: -0.03em; line-height: 1; color: var(--fg); }
.about-facts .fact .num .unit { color: var(--accent); font-size: 0.5em; margin-left: 4px; }
.about-facts .fact .lbl { font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.16em; color: var(--fg-dim); text-transform: uppercase; margin-top: 8px; }

/* image slot placeholder */
.img-slot {
  display: block; background-color: #161614;
  background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.025) 0 2px, transparent 2px 14px);
  position: relative; overflow: hidden;
}
.img-slot .ph {
  position: absolute; inset: 0; display: grid; place-items: center;
  font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.18em;
  color: rgba(244,241,236,0.22); text-transform: uppercase; text-align: center; padding: 12px;
}

.services { background: var(--bg); position: relative; }
.services .container { position: relative; z-index: 1; }
.pricing-grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
@media (min-width: 880px) { .pricing-grid { grid-template-columns: repeat(3, 1fr); gap: 18px; } }
.tier {
  border: 1px solid var(--line); background: var(--bg-2); border-radius: var(--r-xl);
  padding: 28px 24px 24px; display: flex; flex-direction: column; gap: 20px; position: relative;
  transition: transform 360ms var(--ease), border-color 360ms var(--ease), background 360ms var(--ease);
}
.tier:hover { transform: translateY(-4px); border-color: var(--line-strong); }
.tier.featured { background: var(--bg); border-color: var(--accent); }
.tier.featured::before {
  content: "Most popular"; position: absolute; top: 0; left: 24px; transform: translateY(-50%);
  background: var(--accent); color: var(--accent-ink); font-family: "JetBrains Mono", monospace;
  font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; padding: 5px 11px; border-radius: var(--r-pill);
}
.tier-head { display: flex; flex-direction: column; gap: 14px; padding-bottom: 20px; border-bottom: 1px solid var(--line); }
.tier-tag { font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.2em; color: var(--fg-dim); text-transform: uppercase; }
.tier.featured .tier-tag { color: var(--accent); }
.tier-name { font-family: "Archivo", sans-serif; font-weight: 500; font-size: 24px; letter-spacing: -0.02em; line-height: 1.15; }
.tier-price { display: flex; align-items: baseline; gap: 6px; }
.tier-price .amount { font-family: "Archivo", sans-serif; font-weight: 500; font-size: 56px; line-height: 0.95; letter-spacing: -0.04em; }
.tier-price .per { font-family: "JetBrains Mono", monospace; font-size: 11px; letter-spacing: 0.16em; color: var(--fg-dim); text-transform: uppercase; }
.tier-blurb { color: var(--fg-dim); font-size: 14.5px; line-height: 1.55; }
.tier-features { display: flex; flex-direction: column; gap: 10px; font-size: 14.5px; flex: 1; }
.tier-features .feat { display: flex; align-items: flex-start; gap: 12px; color: var(--fg); line-height: 1.45; }
.tier-features .feat .tick {
  flex-shrink: 0; width: 16px; height: 16px; display: inline-grid; place-items: center;
  border-radius: 50%; background: var(--accent); color: var(--accent-ink);
  font-size: 10px; font-weight: 800; margin-top: 3px;
}
.tier-features .feat-group {
  font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.2em;
  color: var(--fg-mute); text-transform: uppercase; margin-top: 8px;
  padding-top: 12px; border-top: 1px dashed var(--line);
}
.tier-cta { margin-top: 4px; }

.pricing-table { border: 1px solid var(--line); background: var(--bg-2); border-radius: var(--r-lg); overflow: hidden; }
.pricing-table .row { display: grid; grid-template-columns: 1.4fr repeat(3, 1fr); align-items: center; border-bottom: 1px solid var(--line); }
.pricing-table .row:last-child { border-bottom: 0; }
.pricing-table .row > div { padding: 18px 16px; font-size: 14px; }
.pricing-table .row > div + div { border-left: 1px solid var(--line); text-align: center; }
.pricing-table .header { background: var(--bg-3); }
.pricing-table .header .tier-name { font-size: 15px; font-weight: 500; letter-spacing: -0.01em; line-height: 1.15; }
.pricing-table .header .tier-price .amount { font-size: 28px; }
.pricing-table .header .tier-price .per { font-size: 10px; }
.pricing-table .header > div { padding: 18px 16px; }

  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel">

/* ── Loader ── */
function StopwatchLoader({ onDone, duration = 2200 }) {
  const [done, setDone] = React.useState(false);
  const [time, setTime] = React.useState({ s: 0, ms: 0 });
  const [progress, setProgress] = React.useState(0);
  React.useEffect(() => {
    const start = performance.now();
    let raf;
    const tick = (now) => {
      const elapsed = now - start;
      const ratio = Math.min(elapsed / duration, 1);
      const eased = 1 - Math.pow(1 - ratio, 2.2);
      const totalMs = Math.floor(eased * 3000);
      setTime({ s: Math.floor(totalMs / 1000), ms: totalMs % 1000 });
      setProgress(Math.floor(eased * 100));
      if (ratio < 1) { raf = requestAnimationFrame(tick); }
      else { setTimeout(() => { setDone(true); setTimeout(() => onDone && onDone(), 700); }, 380); }
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, []);
  const pad2 = (n) => String(n).padStart(2, "0");
  const pad3 = (n) => String(n).padStart(3, "0");
  return (
    <div className={"loader" + (done ? " done" : "")} aria-hidden={done}>
      <div className="loader-inner">
        <div className="h-mono loader-tick">SYSTEM/INIT • PERTH WA</div>
        <div className="stopwatch" role="status" aria-label="Loading">
          <span>00:{pad2(time.s)}</span>
          <span className="ms">.{pad3(time.ms).slice(0, 2)}</span>
        </div>
        <div className="loader-bar"><i style={{ width: progress + "%" }} /></div>
        <div className="loader-tick">PRELOAD {progress}%</div>
      </div>
    </div>
  );
}

/* ── Image placeholder ── */
function ImgSlot({ placeholder, style, className }) {

}

/* ── Hero ── */

    sub: [{ text: "Off-season programming, in-season maintenance, conditioning that holds up at minute 85. " }, { text: "19 years on the pitch tells you what works.", bold: true }],

  {
    title: [[{ text: "12 weeks." }],[{ text: "A different " }, { text: "you", accent: true }, { text: "." }]],
    sub: [{ text: "Personalised training and nutrition for fat loss or muscle gain. " }, { text: "Weekly check-ins. Honest answers when you ask.", bold: true }],

/* ── Marquee ── */
function Marquee() {
  const items = ["Football performance","Body transformations","Online coaching","Strength & conditioning","Hyrox prep","Muscle gain","Fat loss","1:1 PT"];
  const loop = [...items, ...items];
  return (

/* ── About carousel ── */
const ABOUT_SLIDES = [
  { id: "portrait",   what: "Coach portrait",       yr: "Now · MXF",         placeholder: "Drop a portrait of Sean · 4:5" },
  { id: "pro-action", what: "In play · Scotland",   yr: "Pro · 2008–2019",   placeholder: "Match action · pro era" },
  { id: "kit",        what: "Team kit",             yr: "Pro era",           placeholder: "Kit / squad photo" },
  { id: "wa",         what: "Western Australia",    yr: "Semi-pro · 2019+",  placeholder: "Representing WA" },
  { id: "coaching",   what: "On the floor · MXF",  yr: "Clarkson, Perth",   placeholder: "Coaching session" },
];

function AboutCarousel() {
  const [idx, setIdx] = React.useState(0);
  const [paused, setPaused] = React.useState(false);
  React.useEffect(() => {
    if (paused) return;
    const id = setTimeout(() => setIdx((v) => (v + 1) % ABOUT_SLIDES.length), 5000);
    return () => clearTimeout(id);
  }, [idx, paused]);
  const go = (n) => setIdx((n + ABOUT_SLIDES.length) % ABOUT_SLIDES.length);
  const active = ABOUT_SLIDES[idx];
  return (
    <div className="about-carousel" onMouseEnter={() => setPaused(true)} onMouseLeave={() => setPaused(false)}>
      <span className="ac-badge">Sean McManus</span>
      {ABOUT_SLIDES.map((s, i) => (
        <div key={s.id} className={"slide" + (i === idx ? " active" : "")} aria-hidden={i !== idx}>

        </div>
      ))}
      <div className="ac-dots">
        {ABOUT_SLIDES.map((s, i) => (
          <button key={s.id} className={i === idx ? "active" : ""} onClick={() => go(i)} aria-label={"Photo " + (i+1)} />
        ))}
      </div>
      <div className="ac-caption" key={active.id}>
        <span className="what">{active.what}</span>
        <span className="yr">{active.yr}</span>

const TWEAK_DEFAULTS = { accent: "#FFB400", heroVariant: 0, pricingLayout: "cards", testimonialLayout: "grid" };

function useScrollProgress() {
  const [pct, setPct] = React.useState(0);
  const [scrolled, setScrolled] = React.useState(false);
  React.useEffect(() => {
    const onScroll = () => {
      const h = document.documentElement;
      const s = h.scrollTop;
      const total = h.scrollHeight - h.clientHeight;
      setPct(total > 0 ? (s / total) * 100 : 0);
      setScrolled(s > 24);
    };
    onScroll();
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, []);
  return { pct, scrolled };
}

function useReveal() {
  React.useEffect(() => {
    const els = document.querySelectorAll(".reveal, .reveal-stagger");
    const io = new IntersectionObserver(
      (entries) => { entries.forEach((e) => { if (e.isIntersecting) { e.target.classList.add("in"); io.unobserve(e.target); } }); },
      { threshold: 0.14, rootMargin: "0px 0px -8% 0px" }
    );
    els.forEach((el) => io.observe(el));
    return () => io.disconnect();
  });
}

function useScrollSpy(ids) {
  const [active, setActive] = React.useState(ids[0]);
  React.useEffect(() => {
    const io = new IntersectionObserver(
      (entries) => { entries.forEach((e) => { if (e.isIntersecting) setActive(e.target.id); }); },
      { rootMargin: "-40% 0px -55% 0px", threshold: 0 }
    );
    ids.forEach((id) => { const el = document.getElementById(id); if (el) io.observe(el); });
    return () => io.disconnect();
  }, []);
  return active;
}

      <Services layout={t.pricingLayout} setLayout={(v) => setTweak("pricingLayout", v)} onBook={onBook} />
      <Transformations />
      <VideoWins />
      <Testimonials variant={t.testimonialLayout} />
      <FAQ />
      <CtaBanner onBook={onBook} />
      <Footer />
      <FloatingCTA visible={showFloat && !loading} onBook={onBook} />
    </React.Fragment>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

  </script>
</body>
</html>
